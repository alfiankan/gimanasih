name = "gimanasih-backend"
main = "src/index.ts"
compatibility_date = "2024-04-03"

[vars]
JWT_SECRET = "super-secret-key-change-me-in-production"
# Note: GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET should be configured locally in `.dev.vars` (ignored by git).
# For production deployment, set them in your Cloudflare dashboard environment variables.

# Bind a D1 Database. 
# To create the database, run: npx wrangler d1 create gimanasih-db
# Then replace database_name and database_id with your values.
[[d1_databases]]
binding = "DB"
database_name = "gimanasih-db"
database_id = "2d575e54-5392-43fd-8dff-88b0b22eaf70"
migrations_dir = "migrations"
